<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning OLDA</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▦</text></svg>" />
</head>
<body>
  <div class="app">
    <!-- Sidebar = pipeline -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="brand">Planning OLDA</span>
      </div>
      <nav class="stages" id="stages" aria-label="Étapes du pipeline"></nav>
    </aside>

    <!-- Zone de travail -->
    <main class="work">
      <header class="work-head">
        <div class="work-title">
          <h1 id="stageTitle">Commande</h1>
          <span class="work-count" id="stageCount"></span>
        </div>
        <button class="search-trigger" id="searchTrigger" type="button" aria-label="Rechercher une commande">
        <svg class="search-trigger-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span class="search-trigger-label">Rechercher une commande</span>
        <kbd class="search-trigger-kbd" id="searchKbd">⌘K</kbd>
      </button>
      <a class="stage-link" id="stageLink" target="_blank" rel="noopener noreferrer" hidden>
        <svg class="stage-link-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
        <span class="stage-link-label" id="stageLinkLabel"></span>
      </a>
      <button class="btn-ghost" id="btnPrint" type="button" aria-label="Imprimer cette catégorie">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
        <span>Imprimer</span>
      </button>
      <button class="btn-primary" id="btnNew" type="button">+ Nouvelle commande</button>
      </header>

      <div class="grid-wrap">
        <div class="print-head" id="printHead" aria-hidden="true"></div>
        <table class="grid" id="grid">
          <thead>
            <tr>
              <th class="col-handle" aria-label="Glisser"></th>
              <th class="col-priority sortable" data-sort="priority">Priorité</th>
              <th class="col-type sortable" data-sort="client_type">Type</th>
              <th class="col-company sortable" data-sort="billing_company">Société à facturer</th>
              <th class="col-ref sortable" data-sort="contact_referent">Référent</th>
              <th class="col-qty sortable num" data-sort="quantity">Quantité</th>
              <th class="col-product sortable" data-sort="product">Produits</th>
              <th class="col-value sortable num" data-sort="project_value">Valeur du projet</th>
              <th class="col-desc sortable" data-sort="description">Description du projet</th>
              <th class="col-deadline sortable" data-sort="deadline">Échéance</th>
              <th class="col-days sortable" data-sort="days">Jours restant</th>
              <th class="col-status sortable" data-sort="status">État</th>
              <th class="col-del" aria-label=""></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="empty" id="empty" hidden>Aucune commande à cette étape.</div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
