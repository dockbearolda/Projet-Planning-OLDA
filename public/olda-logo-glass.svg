<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="OLDA">
  <title>OLDA — tuile glassmorphism</title>
  <defs>
    <!-- corps du verre : dégradé translucide froid (blanc → canard) -->
    <linearGradient id="glassBody" x1="0" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.44" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#4a6274" stop-opacity="0.18"/>
    </linearGradient>
    <!-- base frostée : la tuile reste lisible sur n'importe quel fond -->
    <linearGradient id="frostBase" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#f3f6f7"/>
      <stop offset="1" stop-color="#dfe6e6"/>
    </linearGradient>
    <!-- reflet spéculaire haut -->
    <radialGradient id="spec" cx="50%" cy="12%" r="64%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.38" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.64" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- ombre interne basse (profondeur) -->
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.55" stop-color="#4a6274" stop-opacity="0"/>
      <stop offset="1" stop-color="#4a6274" stop-opacity="0.16"/>
    </linearGradient>
    <!-- bande de balayage (sheen) -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#4a6274" flood-opacity="0.30"/>
    </filter>
    <filter id="markShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#4a6274" flood-opacity="0.30"/>
    </filter>
    <clipPath id="tileClip"><rect x="16" y="14" width="224" height="224" rx="70"/></clipPath>
  </defs>

  <!-- tuile + ombre portée -->
  <g filter="url(#tileShadow)">
    <rect x="16" y="14" width="224" height="224" rx="70" fill="url(#frostBase)"/>
    <rect x="16" y="14" width="224" height="224" rx="70" fill="url(#glassBody)"/>
  </g>

  <!-- couches de lumière internes (découpées à la tuile) -->
  <g clip-path="url(#tileClip)">
    <rect x="16" y="14" width="224" height="224" fill="url(#bottomShade)"/>
    <rect x="16" y="14" width="224" height="224" fill="url(#spec)"/>
    <!-- balayage diagonal animé (7s, comme dans l'app) -->
    <g transform="rotate(20 128 126)">
      <rect x="-46" y="-130" width="64" height="512" fill="url(#sheen)">
        <animate attributeName="opacity" dur="7s" repeatCount="indefinite"
                 keyTimes="0;0.68;0.74;0.92;1" values="0;0;1;1;0"/>
        <animateTransform attributeName="transform" type="translate" dur="7s" repeatCount="indefinite"
                 keyTimes="0;0.68;1" values="-150 0;-150 0;370 0"/>
      </rect>
    </g>
  </g>

  <!-- arête lumineuse (bord) -->
  <rect x="16.75" y="14.75" width="222.5" height="222.5" rx="69.25" fill="none"
        stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.5"/>

  <!-- marque OLDA (canard) -->
  <g transform="translate(17.24 4.32) scale(0.78)" fill="#4a6274" filter="url(#markShadow)">
    <path d="M187.85,114.63h33.12c.82,0,1.48.66,1.48,1.48v34.05c0,.82-.66,1.48-1.48,1.48h-73.22c-.82,0-1.48-.66-1.48-1.48v-76.52c0-.82.66-1.48,1.48-1.48h37.15c.82,0,1.48.66,1.48,1.48v39.51c0,.82.66,1.48,1.48,1.48Z"/>
    <path d="M141.24,238.96l41.28-77.18c.58-1.05,2.09-1.05,2.67,0l41.39,77.18c.56,1.02-.18,2.26-1.34,2.26h-82.67c-1.16,0-1.89-1.24-1.34-2.26Z"/>
    <path d="M101.44,161.74h-2.56l.48,79.48h1.16c20.68,0,38.61-15.44,40.49-36.03,2.14-23.57-16.43-43.44-39.57-43.44Z"/>
    <path d="M95.36,161.74h-32.71c-.82,0-1.48.66-1.48,1.48v76.52c0,.82.66,1.48,1.48,1.48h32.26l.45-79.48Z"/>
    <path d="M140.12,108.5c-1.61-20.24-18-36.63-38.24-38.24-25.72-2.04-47.09,19.32-45.05,45.04,1.6,20.24,18,36.64,38.24,38.25.12,0,.23,0,.34.02l.23-39.79v-.05l-11.32,11.07s-1.19-11.25,6.13-12.84h-13s4.12-7.32,14.54-4.85l-7.67-7.67s11.86-1.72,12.82,6.62c1.07-8.9,12.54-6.48,12.54-6.48l-7.92,8.04c8.81-3.63,14.91,4.33,14.91,4.33h-13.05c4.85,1.4,6.01,6.08,6.2,9.41.14,2.05-.12,3.59-.12,3.59l-3.54-3.59-7.55-7.62.24,39.91c24-.2,43.23-20.71,41.29-45.17Z"/>
  </g>
</svg>
